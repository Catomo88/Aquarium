<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원준이네 아쿠아스케이핑 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1929;--card:#111e30;--card2:#162438;--border:rgba(255,255,255,.08);
  --accent:#3b9ece;--accent2:#2d7aa8;--text:#d0dce8;--text2:#7a99b4;--text3:#4a6a84;
  --green:#34d399;--green-bg:rgba(52,211,153,.1);--green-bd:rgba(52,211,153,.25);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.1);--yellow-bd:rgba(251,191,36,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-bd:rgba(248,113,113,.25);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);--blue-bd:rgba(96,165,250,.25);
  --purple:#c084fc;--purple-bg:rgba(192,132,252,.1);--purple-bd:rgba(192,132,252,.25);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.1);--orange-bd:rgba(251,146,60,.25);
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.header{background:linear-gradient(135deg,#0f2440,#1a3a5c);padding:32px 40px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;color:#fff;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;color:var(--text2)}
.header .meta{display:flex;gap:20px;margin-top:12px}
.header .meta-item{font-size:12px;color:var(--text3);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.header .meta-item strong{color:var(--text2)}

.main{max-width:1400px;margin:0 auto;padding:24px 28px}

/* Summary cards */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.sum-card:hover,.sum-card.active{border-color:var(--accent);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,158,206,.15)}
.sum-card .num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sum-card .name{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.sum-card .concept{font-size:12px;color:var(--text2);margin-bottom:10px}
.sum-card .badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-fish{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.badge-shrimp{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.badge-snail{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.badge-co2{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-auto{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}

/* Detail panel */
.detail{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;display:none}
.detail.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-header h2{font-size:20px;color:#fff}
.detail-header .vol{font-size:13px;color:var(--text2);background:rgba(255,255,255,.05);padding:4px 14px;border-radius:20px}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-section{padding:20px 24px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.detail-section:nth-child(even){border-right:none}
.detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;font-weight:600}
.spec-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.spec-row:last-child{border-bottom:none}
.spec-label{font-size:13px;color:var(--text2)}
.spec-value{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:60%}

.fauna-list,.flora-list{display:flex;flex-wrap:wrap;gap:6px}
.fauna-tag{font-size:12px;padding:4px 10px;border-radius:16px}
.flora-tag{font-size:12px;padding:4px 10px;border-radius:16px;background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}

/* Ratings */
.rating-grid{display:flex;flex-direction:column;gap:8px}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-label{font-size:13px;color:var(--text2);width:60px;flex-shrink:0}
.rating-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rating-bar{height:100%;border-radius:4px;transition:width .6s ease}
.rating-grade{font-size:12px;font-weight:700;width:40px;text-align:center}
.rating-comment{font-size:11px;color:var(--text3);flex:2}
.grade-a{color:var(--green)}.grade-a .rating-bar{background:var(--green);width:95%}
.grade-bp{color:var(--green)}.grade-bp .rating-bar{background:var(--green);width:82%}
.grade-b{color:var(--yellow)}.grade-b .rating-bar{background:var(--yellow);width:70%}
.grade-bm{color:var(--orange)}.grade-bm .rating-bar{background:var(--orange);width:58%}
.grade-c{color:var(--red)}.grade-c .rating-bar{background:var(--red);width:45%}

/* Recommendations */
.rec-list{display:flex;flex-direction:column;gap:6px}
.rec-item{font-size:13px;color:var(--text);line-height:1.6;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--accent)}

/* Priorities */
.priorities{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.priorities h2{padding:18px 24px;font-size:16px;color:#fff;border-bottom:1px solid var(--border)}
.pri-list{padding:16px 24px}
.pri-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.pri-item:last-child{border-bottom:none}
.pri-level{flex-shrink:0;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.pri-3{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.pri-2{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.pri-1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.pri-content{flex:1}
.pri-target{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.pri-detail{font-size:12px;color:var(--text2);line-height:1.5}

.full-width{grid-column:1/-1}
@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .detail-body{grid-template-columns:1fr}
  .detail-section{border-right:none}
}
@media(max-width:600px){.summary-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1 id="hTitle">원준이네 아쿠아스케이핑</h1>
  <p id="hSub">어항 종합 관리 대시보드</p>
  <div class="meta" id="hMeta"></div>
</div>
<div class="main">
  <div class="summary-row" id="summaryRow"></div>
  <div class="detail" id="detailPanel"></div>
  <div class="priorities" id="priorities"></div>
</div>

oncept":"메인 수초항","volume":"약 27L","substrate":"소일","filter":"페이토 LQ350 외부여과기","light":"메탈라이트 300 (광량 70%, 5시간)","equipment":["100W 히터","자동환수시스템"],"co2":"D701 고압이탄 (2구 분배기, 초당 1방울)","fauna":[{"name":"그린네온테트라","count":9,"type":"fish"},{"name":"라스보라 쿠보타이","count":9,"type":"fish"},{"name":"오토싱","count":1,"type":"fish"},{"name":"생이새우","count":"수십","type":"shrimp"},{"name":"미니 렘즈혼","count":"다수","type":"snail"}],"flora":["미크란테뭄","레이넥키 미니","워터바코바","스트로징 레펜스","로탈라 블러드레드","유로피언 클로버","로탈라 플라워","루드위지아 다이아몬드"],"ratings":{"여과":{"grade":"A","comment":"외부여과기로 안정적인 생물여과 환경"},"생체":{"grade":"B-","comment":"소형어 18마리 + 새우 다수로 27L 대비 다소 과밀"},"수초":{"grade":"A","comment":"카펫 + 레드 계열 구성이 우수, 다양한 수초 조합"},"이탄":{"grade":"A","comment":"D701 고압이탄 도입으로 수초 성장 및 발색 개선 기대"},"수질":{"grade":"B+","comment":"생체량이 많아 수질 변동 주의 필요"}},"recommendations":["쿠보타이 이동 후 적응 상태 관찰 (스트레스 반응, 먹이 반응 등)","소형어 18마리 + 새우 다수로 생체량이 많으므로 주 1회 수질 테스트 권장","이탄 도입 후 수초 성장 속도 변화에 따라 트리밍 주기 조절 필요","이끼 발생 시 조명 시간을 4시간으로 줄이고 점진적 증가"]},{"id":4,"name":"20하이큐브","concept":"서브 샌드항","volume":"약 8L","substrate":"샌드 (중앙 소일통)","filter":"스펀지 여과기","light":"위크아쿠아 미니7","equipment":[],"co2":null,"fauna":[{"name":"제브라 다니오","count":2,"type":"fish"},{"name":"레오파드 다니오","count":1,"type":"fish"},{"name":"야마토 새우","count":2,"type":"shrimp"},{"name":"애플 스네일","count":1,"type":"snail"}],"flora":["암브리아"],"ratings":{"여과":{"grade":"B+","comment":"스펀지 여과기는 소형 수조에 최적화된 여과 방식"},"생체":{"grade":"B","comment":"제브라 다니오 2마리가 공격성으로 분리 사육 중, 서로 잘 적응한 상태"},"수초":{"grade":"B-","comment":"암브리아만으로 단조로운 구성"},"조명":{"grade":"B","comment":"미니7은 20큐브에 적합한 광량"},"수온":{"grade":"C","comment":"히터 없이 겨울철 수온 하락 위험"}},"recommendations":["물생활의 시작점 — 첫째 딸이 유치원에서 데려온 제브라 다니오가 계기","공격성으로 다른 어종과 합사 불가, 현재 2마리 분리 사육 유지","겨울철 대비 10~25W 소형 히터 추가 검토","수초 다양화 검토 — 소일통에 수초 추가 식재 가능"]},{"id":5,"name":"20하이큐브","concept":"서브 수초항","volume":"약 8L","substrate":"소일","filter":"스펀지 여과기","light":"메탈라이트 200 (광량 70%, 5시간)","equipment":["10W 히터"],"co2":"미니 고압이탄 (3~4초당 1방울)","fauna":[{"name":"구피","count":11,"type":"fish"},{"name":"CRS 새우","count":13,"type":"shrimp"},{"name":"애플 스네일","count":1,"type":"snail"}],"flora":["암브리아","루드위지아 아쿠아타","레이넥키 미니","루드위지아 슈퍼레드","옐로우 오란다","로탈라 플라워","미니헤어글라스 재판"],"ratings":{"여과":{"grade":"B+","comment":"스펀지 여과기는 CRS 사육에 최적화, 치새우 안전 확보"},"생체":{"grade":"B","comment":"CRS 13마리 번식 성공은 긍정적, 구피 합사 주의 필요"},"수초":{"grade":"A","comment":"다양한 수초 7종으로 풍성한 구성"},"이탄":{"grade":"B+","comment":"미니 고압이탄 도입으로 수초 성장 촉진"},"수질":{"grade":"B","comment":"CRS는 수질 민감, 자동환수 미설치로 수동 관리 필요"}},"recommendations":["CRS 번식이 활발하므로 구피와의 분리를 장기적으로 검토 (치새우 생존율 향상)","TDS 미터로 환수 전후 수질 모니터링 권장 (정수기 물 사용 시 TDS 변동 확인)","여름철 수온 관리 필수 — CRS 적정 20~24℃, 쿨링팬 준비 권장","구피 분리 시 별도 수조 또는 1번 커뮤니티 수조로의 이동 검토 (4번은 제브라 공격성으로 합사 불가)"]}],"priorities":[{"level":3,"target":"5번 CRS 분리","detail":"CRS 번식 성공 중이므로 구피와 분리하여 치새우 생존율을 높이는 것을 권장. 4번은 제브라 공격성으로 합사 불가, 별도 수조 또는 1번 이동 검토."},{"level":2,"target":"이끼 모니터링","detail":"2번·3번 이탄 도입 후 2~3주간 이끼 발생 여부 확인. 발생 시 조명 시간 조절 또는 생물 투입으로 대응."},{"level":2,"target":"5번 여과 강화","detail":"생체량 증가 시 걸이식 또는 소형 외부여과기 추가 검토."},{"level":1,"target":"4번 히터 추가","detail":"겨울철 대비 10~25W 소형 히터 추가 검토. 현재는 실온이 높아 급하지 않음."}]};

function gradeClass(g){
  if(g==='A')return'grade-a';if(g==='B+')return'grade-bp';
  if(g==='B')return'grade-b';if(g==='B-')return'grade-bm';return'grade-c';
}
function faunaClass(t){
  if(t==='fish')return'badge-fish';if(t==='shrimp')return'badge-shrimp';return'badge-snail';
}
function faunaTagClass(t){
  const m={fish:{bg:'var(--blue-bg)',c:'var(--blue)',bd:'var(--blue-bd)'},
    shrimp:{bg:'var(--orange-bg)',c:'var(--orange)',bd:'var(--orange-bd)'},
    snail:{bg:'var(--purple-bg)',c:'var(--purple)',bd:'var(--purple-bd)'}};
  const s=m[t]||m.fish;
  return`background:${s.bg};color:${s.c};border:1px solid ${s.bd}`;
}
function countFauna(tank){
  let fish=0,shrimp=0,snail=0;
  tank.fauna.forEach(f=>{
    const c=typeof f.count==='number'?f.count:0;
    if(f.type==='fish')fish+=c;else if(f.type==='shrimp')shrimp+=c;else snail+=c;
  });
  return{fish,shrimp,snail};
}

let data=null, activeTank=null;

function init(){
  data=AQUARIUM_DATA;
  renderMeta();renderSummary();renderPriorities();
  selectTank(0);
}

function renderMeta(){
  document.getElementById('hMeta').innerHTML=
    `<span class="meta-item">최종 업데이트 <strong>${data.meta.lastUpdated}</strong></span>`+
    `<span class="meta-item">수조 <strong>${data.meta.totalTanks}개</strong></span>`+
    `<span class="meta-item">수초 <strong>${countAllFlora()}종</strong></span>`+
    `<span class="meta-item">생물 <strong>${countAllFauna()}종</strong></span>`;
}
function countAllFlora(){const s=new Set();data.tanks.forEach(t=>t.flora.forEach(f=>s.add(f)));return s.size}
function countAllFauna(){const s=new Set();data.tanks.forEach(t=>t.fauna.forEach(f=>s.add(f.name)));return s.size}

function renderSummary(){
  const row=document.getElementById('summaryRow');
  row.innerHTML=data.tanks.map((t,i)=>{
    const c=countFauna(t);
    let badges='';
    if(c.fish)badges+=`<span class="badge badge-fish">어류 ${c.fish}</span>`;
    if(c.shrimp)badges+=`<span class="badge badge-shrimp">새우 ${c.shrimp}</span>`;
    if(c.snail)badges+=`<span class="badge badge-snail">스네일 ${c.snail}</span>`;
    if(t.co2)badges+=`<span class="badge badge-co2">CO2</span>`;
    if(t.equipment.includes('자동환수시스템'))badges+=`<span class="badge badge-auto">자동환수</span>`;
    return`<div class="sum-card" data-idx="${i}" onclick="selectTank(${i})">
      <div class="num">${t.id}번 수조</div>
      <div class="name">${t.name}</div>
      <div class="concept">${t.concept} · ${t.volume}</div>
      <div class="badges">${badges}</div>
    </div>`;
  }).join('');
}

function selectTank(idx){
  activeTank=idx;
  document.querySelectorAll('.sum-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  renderDetail(data.tanks[idx]);
}

function renderDetail(t){
  const p=document.getElementById('detailPanel');
  p.classList.add('show');

  const ratings=Object.entries(t.ratings).map(([k,v])=>{
    const gc=gradeClass(v.grade);
    return`<div class="rating-row ${gc}">
      <span class="rating-label">${k}</span>
      <div class="rating-bar-bg"><div class="rating-bar"></div></div>
      <span class="rating-grade">${v.grade}</span>
      <span class="rating-comment">${v.comment}</span>
    </div>`;
  }).join('');

  const fauna=t.fauna.map(f=>{
    const cnt=typeof f.count==='number'?` ×${f.count}`:`(${f.count})`;
    return`<span class="fauna-tag" style="${faunaTagClass(f.type)}">${f.name}${cnt}</span>`;
  }).join('');

  const flora=t.flora.map(f=>`<span class="flora-tag">${f}</span>`).join('');

  const recs=t.recommendations.map(r=>`<div class="rec-item">${r}</div>`).join('');

  const co2Row=t.co2?`<div class="spec-row"><span class="spec-label">CO2</span><span class="spec-value">${t.co2}</span></div>`:'';
  const equipStr=t.equipment.length?t.equipment.join(', '):'없음';

  p.innerHTML=`
    <div class="detail-header">
      <h2>${t.id}번 · ${t.name} <span style="font-weight:400;color:var(--text2);font-size:16px">${t.concept}</span></h2>
      <span class="vol">${t.volume}</span>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h3>장비 스펙</h3>
        <div class="spec-row"><span class="spec-label">바닥재</span><span class="spec-value">${t.substrate}</span></div>
        <div class="spec-row"><span class="spec-label">여과</span><span class="spec-value">${t.filter}</span></div>
        <div class="spec-row"><span class="spec-label">조명</span><span class="spec-value">${t.light}</span></div>
        <div class="spec-row"><span class="spec-label">장비</span><span class="spec-value">${equipStr}</span></div>
        ${co2Row}
      </div>
      <div class="detail-section">
        <h3>평가</h3>
        <div class="rating-grid">${ratings}</div>
      </div>
      <div class="detail-section">
        <h3>생물</h3>
        <div class="fauna-list">${fauna}</div>
      </div>
      <div class="detail-section">
        <h3>수초</h3>
        <div class="flora-list">${flora}</div>
      </div>
      <div class="detail-section full-width">
        <h3>개선 권고사항</h3>
        <div class="rec-list">${recs}</div>
      </div>
    </div>`;
}

function renderPriorities(){
  const el=document.getElementById('priorities');
  const stars={3:'!!!',2:'!!',1:'!'};
  const items=data.priorities.map(p=>`
    <div class="pri-item">
      <div class="pri-level pri-${p.level}">${stars[p.level]}</div>
      <div class="pri-content">
        <div class="pri-target">${p.target}</div>
        <div class="pri-detail">${p.detail}</div>
      </div>
    </div>`).join('');
  el.innerHTML=`<h2>우선순위 과제</h2><div class="pri-list">${items}</div>`;
}

init();
</script>
</body>
</html>
