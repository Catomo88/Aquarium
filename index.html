<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원준이네 아쿠아스케이핑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1929;--card:#111e30;--card2:#162438;--border:rgba(255,255,255,.08);
  --accent:#3b9ece;--accent2:#2d7aa8;--text:#d0dce8;--text2:#7a99b4;--text3:#4a6a84;
  --green:#34d399;--green-bg:rgba(52,211,153,.1);--green-bd:rgba(52,211,153,.25);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.1);--yellow-bd:rgba(251,191,36,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-bd:rgba(248,113,113,.25);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);--blue-bd:rgba(96,165,250,.25);
  --purple:#c084fc;--purple-bg:rgba(192,132,252,.1);--purple-bd:rgba(192,132,252,.25);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.1);--orange-bd:rgba(251,146,60,.25);
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.banner{width:100%;display:none}
@media(max-width:768px){.banner{display:block}}
.cam-fab{display:none;position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(59,158,206,.4);z-index:999;transition:transform .2s}
.cam-fab:active{transform:scale(.9)}
@media(max-width:768px){.cam-fab{display:flex;align-items:center;justify-content:center}}
.sum-thumb{width:100%;height:80px;border-radius:8px;overflow:hidden;margin-top:8px;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.sum-thumb img{width:100%;height:100%;object-fit:cover}
.sum-thumb .no-photo{display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:var(--text3)}
.history-main{max-width:1200px;margin:0 auto;padding:24px 28px}
.history-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.history-filter .hf-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.history-filter .hf-btn.active{border-color:var(--accent);color:#fff;background:rgba(59,158,206,.15)}
.history-tank{margin-bottom:32px}
.history-tank h3{font-size:16px;color:#fff;margin-bottom:12px;font-weight:600}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.history-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.history-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.history-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.history-item .hi-date{padding:8px 12px;font-size:12px;color:var(--text2)}
.history-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:85%;object-fit:contain;border-radius:8px}
.lightbox .lb-info{color:#fff;font-size:14px;margin-top:12px}
.header{background:linear-gradient(135deg,#0f2440,#1a3a5c);padding:12px 40px 0;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;color:#fff;font-weight:700;margin-bottom:2px}
.header p{font-size:12px;color:var(--text2)}
.header .meta{display:flex;gap:16px;margin-top:8px}
.header .meta-item{font-size:12px;color:var(--text3);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.header .meta-item strong{color:var(--text2)}
.tabs{display:flex;gap:0;margin-top:20px}
.tab{padding:12px 28px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:#fff;border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.main{max-width:1400px;margin:0 auto;padding:24px 28px}
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.sum-card:hover,.sum-card.active{border-color:var(--accent);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,158,206,.15)}
.sum-card .num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sum-card .name{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.sum-card .concept{font-size:12px;color:var(--text2);margin-bottom:10px}
.sum-card .badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-fish{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.badge-shrimp{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.badge-snail{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.badge-co2{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-auto{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.detail{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;display:none}
.detail.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-header h2{font-size:20px;color:#fff}
.detail-header .vol{font-size:13px;color:var(--text2);background:rgba(255,255,255,.05);padding:4px 14px;border-radius:20px}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-section{padding:20px 24px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.detail-section:nth-child(even){border-right:none}
.detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;font-weight:600}
.spec-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.spec-row:last-child{border-bottom:none}
.spec-label{font-size:13px;color:var(--text2)}
.spec-value{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:60%}
.fauna-list,.flora-list{display:flex;flex-wrap:wrap;gap:6px}
.fauna-tag{font-size:12px;padding:4px 10px;border-radius:16px}
.flora-tag{font-size:12px;padding:4px 10px;border-radius:16px;background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.rating-grid{display:flex;flex-direction:column;gap:8px}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-label{font-size:13px;color:var(--text2);width:60px;flex-shrink:0}
.rating-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rating-bar{height:100%;border-radius:4px;transition:width .6s ease}
.rating-grade{font-size:12px;font-weight:700;width:40px;text-align:center}
.rating-comment{font-size:11px;color:var(--text3);flex:2}
.grade-ap{color:var(--green)}.grade-ap .rating-bar{background:var(--green);width:100%}
.grade-a{color:var(--green)}.grade-a .rating-bar{background:var(--green);width:95%}
.grade-am{color:var(--green)}.grade-am .rating-bar{background:var(--green);width:88%}
.grade-bp{color:var(--green)}.grade-bp .rating-bar{background:var(--green);width:82%}
.grade-b{color:var(--yellow)}.grade-b .rating-bar{background:var(--yellow);width:70%}
.grade-bm{color:var(--orange)}.grade-bm .rating-bar{background:var(--orange);width:58%}
.grade-cp{color:var(--orange)}.grade-cp .rating-bar{background:var(--orange);width:52%}
.grade-c{color:var(--red)}.grade-c .rating-bar{background:var(--red);width:45%}
.rec-list{display:flex;flex-direction:column;gap:6px}
.rec-item{font-size:13px;color:var(--text);line-height:1.6;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--accent)}
.priorities{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.priorities h2{padding:18px 24px;font-size:16px;color:#fff;border-bottom:1px solid var(--border)}
.pri-list{padding:16px 24px}
.pri-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.pri-item:last-child{border-bottom:none}
.pri-level{flex-shrink:0;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.pri-3{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.pri-2{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.pri-1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.pri-content{flex:1}
.pri-target{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.pri-detail{font-size:12px;color:var(--text2);line-height:1.5}
.full-width{grid-column:1/-1}
.status-cards{display:flex;flex-direction:column;gap:24px;max-width:1100px;margin:0 auto}
.st-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px)}
.st-card-header{display:flex;align-items:center;gap:14px;padding:18px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.st-tank-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.st-card:nth-child(1) .st-tank-num{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.st-card:nth-child(2) .st-tank-num{background:linear-gradient(135deg,#0891b2,#22d3ee)}
.st-card:nth-child(3) .st-tank-num{background:linear-gradient(135deg,#059669,#34d399)}
.st-card:nth-child(4) .st-tank-num{background:linear-gradient(135deg,#d97706,#fbbf24)}
.st-card:nth-child(5) .st-tank-num{background:linear-gradient(135deg,#9333ea,#c084fc)}
.st-card-title{display:flex;flex-direction:column;gap:2px}
.st-card-title .st-name{font-size:18px;font-weight:700;color:#f0f6fc}
.st-card-title .st-tag{font-size:12px;color:#8badc4;background:rgba(255,255,255,.08);padding:2px 10px;border-radius:20px;display:inline-block;width:fit-content}
.st-card-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:0}
.st-cell{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05)}
.st-cell:last-child{border-right:none}
.st-cell-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5a8aaa;margin-bottom:6px;font-weight:600}
.st-cell-value{font-size:14px;line-height:1.6;color:#c8dae8}
.st-cell-value strong{color:#f0f6fc;font-weight:600}
.st-bio{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:0}
.st-bio .st-cell{border-bottom:none}
.fish-tag,.plant-tag,.shrimp-tag,.snail-tag{font-size:13px;padding:3px 10px;border-radius:20px;display:inline-block}
.fish-tag{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.plant-tag{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.2)}
.shrimp-tag{background:rgba(251,146,60,.15);color:#fdba74;border:1px solid rgba(251,146,60,.2)}
.snail-tag{background:rgba(168,85,247,.15);color:#d8b4fe;border:1px solid rgba(168,85,247,.2)}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .detail-body{grid-template-columns:1fr}
  .detail-section{border-right:none}
  .st-bio{grid-template-columns:1fr}
}
@media(max-width:600px){
  .summary-row{grid-template-columns:1fr}
  .st-card-body{grid-template-columns:1fr}
  .tabs{gap:0}.tab{padding:12px 16px;font-size:13px}
}
</style>
</head>
<body>
<img src="banner.jpg" alt="Triple Aquatic Symphony" class="banner">
<button class="cam-fab" onclick="window.location.href='camera.html'" title="어항 카메라">📷</button>
<div class="header">
  <h1>원준이네 아쿠아스케이핑</h1>
  <p>어항 종합 관리</p>
  <div class="meta" id="hMeta"></div>
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="dashboard">대시보드</div>
    <div class="tab" data-tab="status">세팅 현황표</div>
    <div class="tab" data-tab="history">어항 히스토리</div>
  </div>
</div>
<div class="tab-content active" id="tab-dashboard">
  <div class="main">
    <div class="summary-row" id="summaryRow"></div>
    <div class="detail" id="detailPanel"></div>
    <div class="priorities" id="priorities"></div>
  </div>
</div>
<div class="tab-content" id="tab-history">
  <div class="history-main">
    <div class="history-filter" id="historyFilter"></div>
    <div id="historyContent"></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lbImg"><div class="lb-info" id="lbInfo"></div>
</div>
<div class="tab-content" id="tab-status">
  <div class="main">
    <div class="status-cards" id="statusCards"></div>
  </div>
</div>

document.getElementById('tabBar').addEventListener('click',function(e){
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('tab-'+t.dataset.tab).classList.add('active');
});

function gradeClass(g){
  if(g==='A+')return'grade-ap';if(g==='A')return'grade-a';if(g==='A-')return'grade-am';
  if(g==='B+')return'grade-bp';if(g==='B')return'grade-b';if(g==='B-')return'grade-bm';
  if(g==='C+')return'grade-cp';return'grade-c';
}
function faunaTagClass(t){
  const m={fish:{bg:'var(--blue-bg)',c:'var(--blue)',bd:'var(--blue-bd)'},
    shrimp:{bg:'var(--orange-bg)',c:'var(--orange)',bd:'var(--orange-bd)'},
    snail:{bg:'var(--purple-bg)',c:'var(--purple)',bd:'var(--purple-bd)'}};
  const s=m[t]||m.fish;return`background:${s.bg};color:${s.c};border:1px solid ${s.bd}`;
}
function countFauna(tank){
  let fish=0,shrimp=0,snail=0;
  tank.fauna.forEach(f=>{const c=typeof f.count==='number'?f.count:0;
    if(f.type==='fish')fish+=c;else if(f.type==='shrimp')shrimp+=c;else snail+=c;});
  return{fish,shrimp,snail};
}
let data=null,activeTank=null;
function init(){
  data=AQUARIUM_DATA;
  renderMeta();renderSummary();renderPriorities();renderStatus();selectTank(0);
}
function renderMeta(){
  document.getElementById('hMeta').innerHTML=
    `<span class="meta-item">최종 업데이트 <strong>${data.meta.lastUpdated}</strong></span>`+
    `<span class="meta-item">수조 <strong>${data.meta.totalTanks}개</strong></span>`+
    `<span class="meta-item">수초 <strong>${cntFlora()}종</strong></span>`+
    `<span class="meta-item">생물 <strong>${cntFauna()}종</strong></span>`;
}
function cntFlora(){const s=new Set();data.tanks.forEach(t=>t.flora.forEach(f=>s.add(f)));return s.size}
function cntFauna(){const s=new Set();data.tanks.forEach(t=>t.fauna.forEach(f=>s.add(f.name)));return s.size}
function renderSummary(){
  document.getElementById('summaryRow').innerHTML=data.tanks.map((t,i)=>{
    const c=countFauna(t);let b='';
    if(c.fish)b+=`<span class="badge badge-fish">어류 ${c.fish}</span>`;
    if(c.shrimp)b+=`<span class="badge badge-shrimp">새우 ${c.shrimp}</span>`;
    if(c.snail)b+=`<span class="badge badge-snail">스네일 ${c.snail}</span>`;
    if(t.co2)b+=`<span class="badge badge-co2">CO2</span>`;
    if(t.equipment.includes('자동환수시스템'))b+=`<span class="badge badge-auto">자동환수</span>`;
    const thumb=`<div class="sum-thumb"><img src="photos/tank-${t.id}/latest.jpg" onerror="this.parentElement.innerHTML='<div class=\\'no-photo\\'>📷 사진 없음</div>'"></div>`;
    return`<div class="sum-card" onclick="selectTank(${i})"><div class="num">${t.id}번 수조</div><div class="name">${t.name}</div><div class="concept">${t.concept} · ${t.volume}</div>${thumb}<div class="badges">${b}</div></div>`;
  }).join('');
}
function selectTank(idx){
  activeTank=idx;
  document.querySelectorAll('.sum-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  renderDetail(data.tanks[idx]);
}
function renderDetail(t){
  const p=document.getElementById('detailPanel');p.classList.add('show');
  const ratings=Object.entries(t.ratings).map(([k,v])=>{const gc=gradeClass(v.grade);
    return`<div class="rating-row ${gc}"><span class="rating-label">${k}</span><div class="rating-bar-bg"><div class="rating-bar"></div></div><span class="rating-grade">${v.grade}</span><span class="rating-comment">${v.comment}</span></div>`;}).join('');
  const fauna=t.fauna.map(f=>{const cnt=typeof f.count==='number'?` ×${f.count}`:`(${f.count})`;
    return`<span class="fauna-tag" style="${faunaTagClass(f.type)}">${f.name}${cnt}</span>`;}).join('');
  const flora=t.flora.map(f=>`<span class="flora-tag">${f}</span>`).join('');
  const recs=t.recommendations.map(r=>`<div class="rec-item">${r}</div>`).join('');
  const co2=t.co2?`<div class="spec-row"><span class="spec-label">CO2</span><span class="spec-value">${t.co2}</span></div>`:'';
  const excel=t.flourishExcel?`<div class="spec-row"><span class="spec-label">플로엑셀</span><span class="spec-value">${t.flourishExcel}</span></div>`:'';
  const eq=t.equipment.length?t.equipment.join(', '):'없음';
  p.innerHTML=`<div class="detail-header"><h2>${t.id}번 · ${t.name} <span style="font-weight:400;color:var(--text2);font-size:16px">${t.concept}</span></h2><span class="vol">${t.volume}</span></div>
    <div class="detail-body"><div class="detail-section"><h3>장비 스펙</h3><div class="spec-row"><span class="spec-label">바닥재</span><span class="spec-value">${t.substrate}</span></div><div class="spec-row"><span class="spec-label">여과</span><span class="spec-value">${t.filter}</span></div><div class="spec-row"><span class="spec-label">조명</span><span class="spec-value">${t.light}</span></div><div class="spec-row"><span class="spec-label">장비</span><span class="spec-value">${eq}</span></div>${co2}${excel}</div>
    <div class="detail-section"><h3>평가</h3><div class="rating-grid">${ratings}</div></div>
    <div class="detail-section"><h3>생물</h3><div class="fauna-list">${fauna}</div></div>
    <div class="detail-section"><h3>수초</h3><div class="flora-list">${flora}</div></div>
    <div class="detail-section full-width"><h3>개선 권고사항</h3><div class="rec-list">${recs}</div></div></div>`;
}
function renderPriorities(){
  const el=document.getElementById('priorities');const s={3:'!!!',2:'!!',1:'!'};
  el.innerHTML=`<h2>우선순위 과제</h2><div class="pri-list">${data.priorities.map(p=>`<div class="pri-item"><div class="pri-level pri-${p.level}">${s[p.level]}</div><div class="pri-content"><div class="pri-target">${p.target}</div><div class="pri-detail">${p.detail}</div></div></div>`).join('')}</div>`;
}
function renderStatus(){
  document.getElementById('statusCards').innerHTML=data.tanks.map(t=>{
    const fa=t.fauna.map(f=>{const cls=f.type==='fish'?'fish-tag':f.type==='shrimp'?'shrimp-tag':'snail-tag';
      const cnt=typeof f.count==='number'?` ×${f.count}`:` (${f.count})`;return`<span class="${cls}">${f.name}${cnt}</span>`;}).join('');
    const fl=t.flora.map(f=>`<span class="plant-tag">${f}</span>`).join('');
    const co2=t.co2?`<div class="st-cell"><div class="st-cell-label">CO2</div><div class="st-cell-value"><strong>${t.co2}</strong></div></div>`:'';
    const excel2=t.flourishExcel?`<div class="st-cell"><div class="st-cell-label">플로엑셀</div><div class="st-cell-value"><strong>${t.flourishExcel}</strong></div></div>`:'';
    const eq=t.equipment.length?t.equipment.join('<br>'):'—';
    return`<div class="st-card"><div class="st-card-header"><div class="st-tank-num">${t.id}</div><div class="st-card-title"><span class="st-name">${t.name}</span><span class="st-tag">${t.concept} · ${t.volume}</span></div></div>
      <div class="st-card-body"><div class="st-cell"><div class="st-cell-label">바닥재</div><div class="st-cell-value"><strong>${t.substrate}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">여과 시스템</div><div class="st-cell-value"><strong>${t.filter}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">조명</div><div class="st-cell-value"><strong>${t.light}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">장비</div><div class="st-cell-value">${eq}</div></div>${co2}${excel2}
      <div class="st-bio"><div class="st-cell"><div class="st-cell-label">생물 라인업</div><div class="tag-list">${fa}</div></div>
      <div class="st-cell"><div class="st-cell-label">수초</div><div class="tag-list">${fl}</div></div></div></div></div>`;
  }).join('');
}
const GITHUB_API='https://api.github.com/repos/Catomo88/Aquarium/contents/photos';
let historyCache={};
let activeHistoryFilter='all';

function renderHistoryFilter(){
  const el=document.getElementById('historyFilter');
  const btns=[{id:'all',label:'전체'}];
  data.tanks.forEach(t=>btns.push({id:'tank-'+t.id,label:t.id+'번 '+t.name}));
  btns.push({id:'panorama',label:'★ 파노라마'});
  el.innerHTML=btns.map(b=>`<div class="hf-btn${b.id===activeHistoryFilter?' active':''}" onclick="filterHistory('${b.id}')">${b.label}</div>`).join('');
}

function filterHistory(id){
  activeHistoryFilter=id;
  renderHistoryFilter();
  renderHistoryContent();
}

async function loadHistory(){
  renderHistoryFilter();
  const folders=['tank-1','tank-2','tank-3','tank-4','tank-5','panorama'];
  for(const folder of folders){
    if(historyCache[folder])continue;
    try{
      const res=await fetch(`${GITHUB_API}/${folder}`,{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!res.ok){historyCache[folder]=[];continue;}
      const files=await res.json();
      historyCache[folder]=files.filter(f=>f.name!=='latest.jpg'&&f.name.endsWith('.jpg')).map(f=>({
        name:f.name,
        url:f.download_url,
        date:f.name.replace('.jpg','').replace('_',' ').replace(/(\d{4})-(\d{2})-(\d{2}) (\d{2})(\d{2})/,'$1.$2.$3 $4:$5')
      })).sort((a,b)=>b.name.localeCompare(a.name));
    }catch(e){historyCache[folder]=[];}
  }
  renderHistoryContent();
}

function renderHistoryContent(){
  const el=document.getElementById('historyContent');
  const folders=activeHistoryFilter==='all'?['tank-1','tank-2','tank-3','tank-4','tank-5','panorama']:[activeHistoryFilter];
  const tankNames={'tank-1':'1번 2자 슬림','tank-2':'2번 30하이큐브 샌드항','tank-3':'3번 30하이큐브 수초항','tank-4':'4번 20하이큐브 샌드항','tank-5':'5번 20하이큐브 수초항','panorama':'★ 파노라마'};
  let html='';
  let hasPhotos=false;
  for(const folder of folders){
    const photos=historyCache[folder]||[];
    if(photos.length===0)continue;
    hasPhotos=true;
    html+=`<div class="history-tank"><h3>${tankNames[folder]||folder}</h3><div class="history-grid">`;
    photos.forEach(p=>{
      html+=`<div class="history-item" onclick="openLightbox('${p.url}','${tankNames[folder]} — ${p.date}')"><img src="${p.url}" loading="lazy"><div class="hi-date">${p.date}</div></div>`;
    });
    html+=`</div></div>`;
  }
  if(!hasPhotos)html=`<div class="history-empty">📷 아직 업로드된 사진이 없습니다.<br>카메라 버튼으로 첫 사진을 찍어보세요!</div>`;
  el.innerHTML=html;
}

function openLightbox(url,info){
  document.getElementById('lbImg').src=url;
  document.getElementById('lbInfo').textContent=info;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}

// Load history when tab is clicked
document.getElementById('tabBar').addEventListener('click',function(e){
  const t=e.target.closest('.tab');
  if(t&&t.dataset.tab==='history')loadHistory();
});

init();
</script>
