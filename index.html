<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0b1929">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>원준이네 아쿠아스케이핑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1929;--card:#111e30;--card2:#162438;--border:rgba(255,255,255,.08);
  --accent:#3b9ece;--accent2:#2d7aa8;--text:#d0dce8;--text2:#7a99b4;--text3:#4a6a84;
  --green:#34d399;--green-bg:rgba(52,211,153,.1);--green-bd:rgba(52,211,153,.25);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.1);--yellow-bd:rgba(251,191,36,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-bd:rgba(248,113,113,.25);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);--blue-bd:rgba(96,165,250,.25);
  --purple:#c084fc;--purple-bg:rgba(192,132,252,.1);--purple-bd:rgba(192,132,252,.25);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.1);--orange-bd:rgba(251,146,60,.25);
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.banner{width:100%;display:none}
@media(max-width:768px){.banner{display:block}}
.cam-fab{display:none;position:fixed;bottom:24px;right:24px;width:46px;height:46px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;line-height:1;cursor:pointer;box-shadow:0 4px 16px rgba(59,158,206,.4);z-index:999;transition:transform .2s}
.cam-fab:active{transform:scale(.9)}
@media(max-width:768px){.cam-fab{display:flex;align-items:center;justify-content:center}}
.sum-card{display:flex;gap:12px;align-items:stretch}
.sum-card-info{flex:1;min-width:0}
.sum-thumb{width:64px;height:64px;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.03);border:1px solid var(--border);flex-shrink:0;align-self:center}
.sum-thumb img{width:100%;height:100%;object-fit:cover}
.sum-thumb .no-photo{display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:var(--text3)}
.history-main{max-width:1200px;margin:0 auto;padding:24px 28px}
.history-filter{display:flex;gap:0;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.history-filter::-webkit-scrollbar{display:none}
.history-filter .hf-btn{flex:1;min-width:0;padding:12px 6px;border:none;border-right:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;white-space:nowrap}
.history-filter .hf-btn:last-child{border-right:none}
.history-filter .hf-btn .hf-icon{font-size:20px;line-height:1}
.history-filter .hf-btn.active{color:#fff;background:rgba(59,158,206,.15)}
@media(max-width:600px){.history-filter .hf-btn{padding:10px 4px;font-size:10px}.history-filter .hf-btn .hf-icon{font-size:18px}}
.history-tank{margin-bottom:28px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.history-tank-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.history-tank-header h3{font-size:15px;color:#fff;font-weight:600}
.history-tank-header .photo-count{font-size:12px;color:var(--text3)}
.history-strip{display:flex;gap:12px;padding:16px 20px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.history-strip::-webkit-scrollbar{height:4px}
.history-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.history-item{flex-shrink:0;width:180px;scroll-snap-align:start;cursor:pointer;transition:all .2s;border-radius:10px;overflow:hidden;border:2px solid transparent;background:var(--card2)}
.history-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.history-item.latest{border-color:var(--green)}
.history-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.history-item .hi-meta{padding:6px 10px}
.history-item .hi-date{font-size:11px;color:var(--text2)}
.history-item .hi-tag{font-size:9px;color:var(--green);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.history-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:85%;object-fit:contain;border-radius:8px}
.lightbox .lb-info{color:#fff;font-size:14px;margin-top:12px}
.header{background:linear-gradient(135deg,#0f2440,#1a3a5c);padding:12px 40px 0;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;color:#fff;font-weight:700;margin-bottom:2px}
.header p{font-size:12px;color:var(--text2)}
.header .meta{display:flex;gap:16px;margin-top:8px}
.header .meta-item{font-size:12px;color:var(--text3);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.header .meta-item strong{color:var(--text2)}
.tabs{display:flex;gap:0;margin-top:20px}
.tab{padding:12px 28px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:#fff;border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.main{max-width:1400px;margin:0 auto;padding:24px 28px}
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all .2s}
.sum-card:hover,.sum-card.active{border-color:var(--accent);background:var(--card2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,158,206,.15)}
.sum-card .num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sum-card .name{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.sum-card .concept{font-size:12px;color:var(--text2);margin-bottom:10px}
.sum-card .badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-fish{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.badge-shrimp{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.badge-snail{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.badge-co2{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge-auto{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.detail{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;display:none}
.detail.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-header h2{font-size:20px;color:#fff}
.detail-header .vol{font-size:13px;color:var(--text2);background:rgba(255,255,255,.05);padding:4px 14px;border-radius:20px}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-section{padding:20px 24px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.detail-section:nth-child(even){border-right:none}
.detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;font-weight:600}
.spec-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.spec-row:last-child{border-bottom:none}
.spec-label{font-size:13px;color:var(--text2)}
.spec-value{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:60%}
.fauna-list,.flora-list{display:flex;flex-wrap:wrap;gap:6px}
.fauna-tag{font-size:12px;padding:4px 10px;border-radius:16px}
.flora-tag{font-size:12px;padding:4px 10px;border-radius:16px;background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.rating-grid{display:flex;flex-direction:column;gap:8px}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-label{font-size:13px;color:var(--text2);width:60px;flex-shrink:0}
.rating-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rating-bar{height:100%;border-radius:4px;transition:width .6s ease}
.rating-grade{font-size:12px;font-weight:700;width:40px;text-align:center}
.rating-comment{font-size:12px;color:var(--text2);flex:2}
.grade-ap{color:var(--green)}.grade-ap .rating-bar,.grade-ap .dr-detail-bar{background:var(--green);width:100%}
.grade-a{color:var(--green)}.grade-a .rating-bar,.grade-a .dr-detail-bar{background:var(--green);width:95%}
.grade-am{color:var(--green)}.grade-am .rating-bar,.grade-am .dr-detail-bar{background:var(--green);width:88%}
.grade-bp{color:var(--green)}.grade-bp .rating-bar,.grade-bp .dr-detail-bar{background:var(--green);width:82%}
.grade-b{color:var(--yellow)}.grade-b .rating-bar,.grade-b .dr-detail-bar{background:var(--yellow);width:70%}
.grade-bm{color:var(--orange)}.grade-bm .rating-bar,.grade-bm .dr-detail-bar{background:var(--orange);width:58%}
.grade-cp{color:var(--orange)}.grade-cp .rating-bar,.grade-cp .dr-detail-bar{background:var(--orange);width:52%}
.grade-c{color:var(--red)}.grade-c .rating-bar,.grade-c .dr-detail-bar{background:var(--red);width:45%}
.grade-na{color:var(--text3)}.grade-na .rating-bar,.grade-na .dr-detail-bar{background:var(--text3);width:0%}
.design-main{max-width:1100px;margin:0 auto;padding:24px 28px}
.dr-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.dr-header{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--border);cursor:pointer}
.dr-tank-num{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.dr-card:nth-child(1) .dr-tank-num{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.dr-card:nth-child(2) .dr-tank-num{background:linear-gradient(135deg,#0891b2,#22d3ee)}
.dr-card:nth-child(3) .dr-tank-num{background:linear-gradient(135deg,#059669,#34d399)}
.dr-card:nth-child(4) .dr-tank-num{background:linear-gradient(135deg,#d97706,#fbbf24)}
.dr-card:nth-child(5) .dr-tank-num{background:linear-gradient(135deg,#9333ea,#c084fc)}
.dr-title{flex:1}
.dr-title .dr-name{font-size:16px;font-weight:700;color:#fff}
.dr-title .dr-concept{font-size:12px;color:var(--text2)}
.dr-grade-badge{font-size:20px;font-weight:800;padding:6px 16px;border-radius:10px;min-width:50px;text-align:center}
.dr-grade-badge.g-a{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.dr-grade-badge.g-b{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.dr-grade-badge.g-c{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.dr-grade-badge.g-na{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.dr-body{padding:20px 24px;display:none}
.dr-body.open{display:block}
.dr-summary{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;border-left:3px solid var(--accent)}
.dr-date{font-size:11px;color:var(--text3);margin-bottom:16px}
.dr-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:18px 0 10px;font-weight:600}
.dr-detail-grid{display:flex;flex-direction:column;gap:8px}
.dr-detail-row{display:flex;align-items:center;gap:10px}
.dr-detail-label{font-size:13px;color:var(--text2);width:70px;flex-shrink:0}
.dr-detail-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;max-width:120px}
.dr-detail-bar{height:100%;border-radius:4px;transition:width .6s ease}
.dr-detail-grade{font-size:12px;font-weight:700;width:30px;text-align:center}
.dr-detail-comment{font-size:12px;color:var(--text2);flex:2;min-width:0}
.dr-suggest{margin-top:4px}
.dr-suggest-item{font-size:13px;color:var(--text);line-height:1.6;padding:8px 12px;background:rgba(52,211,153,.05);border-radius:8px;border-left:3px solid var(--green);margin-bottom:6px}
.dr-changes{margin-top:4px}
.dr-change-item{font-size:13px;color:var(--text);line-height:1.6;padding:8px 12px;background:rgba(59,130,246,.08);border-radius:8px;border-left:3px solid var(--accent);margin-bottom:6px}
.dr-photo{width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:16px;border:1px solid var(--border)}
@media(max-width:600px){.dr-detail-bar-bg{max-width:60px}.dr-detail-comment{font-size:11px}}
.rec-list{display:flex;flex-direction:column;gap:6px}
.rec-item{font-size:13px;color:var(--text);line-height:1.6;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--accent)}
.priorities{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.priorities h2{padding:18px 24px;font-size:16px;color:#fff;border-bottom:1px solid var(--border)}
.pri-list{padding:16px 24px}
.pri-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.pri-item:last-child{border-bottom:none}
.pri-level{flex-shrink:0;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.pri-3{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.pri-2{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.pri-1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.pri-content{flex:1}
.pri-target{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.pri-detail{font-size:12px;color:var(--text2);line-height:1.5}
.full-width{grid-column:1/-1}
.status-cards{display:flex;flex-direction:column;gap:24px;max-width:1100px;margin:0 auto}
.st-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px)}
.st-card-header{display:flex;align-items:center;gap:14px;padding:18px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.st-tank-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.st-card:nth-child(1) .st-tank-num{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.st-card:nth-child(2) .st-tank-num{background:linear-gradient(135deg,#0891b2,#22d3ee)}
.st-card:nth-child(3) .st-tank-num{background:linear-gradient(135deg,#059669,#34d399)}
.st-card:nth-child(4) .st-tank-num{background:linear-gradient(135deg,#d97706,#fbbf24)}
.st-card:nth-child(5) .st-tank-num{background:linear-gradient(135deg,#9333ea,#c084fc)}
.st-card-title{display:flex;flex-direction:column;gap:2px}
.st-card-title .st-name{font-size:18px;font-weight:700;color:#f0f6fc}
.st-card-title .st-tag{font-size:12px;color:#8badc4;background:rgba(255,255,255,.08);padding:2px 10px;border-radius:20px;display:inline-block;width:fit-content}
.st-card-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:0}
.st-cell{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05)}
.st-cell:last-child{border-right:none}
.st-cell-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5a8aaa;margin-bottom:6px;font-weight:600}
.st-cell-value{font-size:14px;line-height:1.6;color:#c8dae8}
.st-cell-value strong{color:#f0f6fc;font-weight:600}
.st-bio{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:0}
.st-bio .st-cell{border-bottom:none}
.fish-tag,.plant-tag,.shrimp-tag,.snail-tag{font-size:13px;padding:3px 10px;border-radius:20px;display:inline-block}
.fish-tag{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.plant-tag{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.2)}
.shrimp-tag{background:rgba(251,146,60,.15);color:#fdba74;border:1px solid rgba(251,146,60,.2)}
.snail-tag{background:rgba(168,85,247,.15);color:#d8b4fe;border:1px solid rgba(168,85,247,.2)}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .detail-body{grid-template-columns:1fr}
  .detail-section{border-right:none}
  .st-bio{grid-template-columns:1fr}
}
@media(max-width:600px){
  .summary-row{grid-template-columns:1fr}
  .st-card-body{grid-template-columns:1fr}
  .tabs{gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 14px;font-size:12px}
}

.retired-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--text3);border:1px solid var(--border);margin-left:8px}
.retired-card{opacity:.7;transition:opacity .2s}
.retired-card:hover{opacity:1}
.retired-reason{font-size:12px;color:var(--text3);padding:12px 24px;border-top:1px solid var(--border);font-style:italic}
.retired-header-wrap{display:flex;flex-direction:column;gap:16px;padding:24px 28px;text-align:center}
.retired-header-wrap h2{font-size:18px;color:var(--text2);font-weight:600}
.retired-header-wrap p{font-size:13px;color:var(--text3)}
</style>
</head>
<body>
<img src="banner.jpg" alt="Triple Aquatic Symphony" class="banner">
<button class="cam-fab" onclick="window.location.href='camera.html'" title="어항 카메라">📷</button>
<div class="header">
  <h1>원준이네 아쿠아스케이핑</h1>
  <p>어항 종합 관리</p>
  <div class="meta" id="hMeta"></div>
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="dashboard">대시보드</div>
    <div class="tab" data-tab="status">세팅 현황표</div>
    <div class="tab" data-tab="history">어항 히스토리</div>
    <div class="tab" data-tab="design">디자인 리뷰</div>
    <div class="tab" data-tab="retired">추억의 어항</div>
  </div>
</div>
<div class="tab-content active" id="tab-dashboard">
  <div class="main">
    <div class="summary-row" id="summaryRow"></div>
    <div class="detail" id="detailPanel"></div>
    <div class="priorities" id="priorities"></div>
  </div>
</div>
<div class="tab-content" id="tab-history">
  <div class="history-main">
    <div class="history-filter" id="historyFilter"></div>
    <div id="historyContent"></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lbImg"><div class="lb-info" id="lbInfo"></div>
</div>
<div class="tab-content" id="tab-design">
  <div class="design-main" id="designCards"></div>
</div>
<div class="tab-content" id="tab-retired">
  <div class="main">
    <div class="status-cards" id="retiredCards"></div>
  </div>
</div>
<div class="tab-content" id="tab-status">
  <div class="main">
    <div class="status-cards" id="statusCards"></div>
  </div>
</div>
<script>

크란테뭄 카펫, 중경 루드위지아 다이아몬드를 중심으로 한 레이어 구조가 완벽하게 복원되었습니다. 후경 스템 수초들이 수면까지 풍성하게 자라 수직적인 구도가 매우 안정적이며, 트리밍 직후의 아쉬움이 완전히 해소되었습니다."},"색감":{"grade":"A+","comment":"루드위지아 다이아몬드와 로탈라 블러드레드의 짙은 와인레드 발색이 중경과 후경에서 폭발적입니다. 전경 미크란테뭄의 밝은 연두색 카펫과 좌측 레이넥키 미니, 스트로징 레펜스의 그린 톤이 어우러져 완벽한 적-녹 대비를 이루고 있습니다. 그린네온테트라의 푸른 발색도 수초 사이에서 빛을 발하며 생동감을 더합니다."},"밸런스":{"grade":"A+","comment":"후경 수초들이 충분히 성장하여 상단부의 빈 공간이 사라지면서 전체적인 수직 및 수평 밸런스가 완벽하게 회복되었습니다. 좌측 그린 계열과 우측 레드 계열의 색감 대비가 시각적인 균형을 이루며 안정감을 줍니다."},"밀도":{"grade":"A+","comment":"전경 미크란테뭄 카펫은 여전히 빈틈 없이 완벽한 밀도를 자랑합니다. 중경 루드위지아 다이아몬드와 후경 로탈라 블러드레드, 워터바코바가 트리밍 후 완전히 성장하여 후경 벽을 풍성하게 채워 전체적인 밀도가 매우 높습니다. 수조 상단까지 수초가 꽉 차 있어 안정적인 느낌을 줍니다."},"장비노출":{"grade":"B","comment":"후경 수초의 성장으로 좌측 100W 히터의 노출이 이전보다 줄었으나, 여전히 부분적으로 보입니다. 우측 D701 고압이탄 디퓨저와 페이토 LQ350 외부여과기 출수구 및 입수구는 여전히 명확하게 노출되어 있습니다. 좌측 자동환수 라인도 수면 위로 가시화되어 아쉬움을 남깁니다."}},"suggestions":["히터를 외부여과기 내장형으로 교체하거나, 수초 성장 방향을 조절하여 히터를 완전히 가리는 것을 고려해 보세요.","CO2 디퓨저와 외부여과기 입출수구를 투명 아크릴 또는 유리 재질의 미니멀한 디자인으로 교체하여 시각적 방해를 최소화할 수 있습니다.","유로피언 클로버를 부상 수초로 활용하는 대신, 중경이나 전경의 빈 공간에 심어 밀도를 더 높이는 방안을 고려해 볼 수 있습니다."],"changes":["구도 A → A+: 후경 수초의 재성장으로 수직적 구도와 레이어 구조가 완벽하게 복원됨.","밸런스 A- → A+: 후경 상단부의 빈 공간이 채워지면서 전체적인 수직 밸런스가 강화됨.","밀도 B+ → A+: 후경 스템 수초(로탈라 블러드레드, 워터바코바)가 충분히 성장하여 후경 벽을 풍성하게 채워 전체 밀도가 크게 증가함.","장비노출 B → B: 후경 수초 성장으로 히터 노출이 일부 감소했으나, 다른 장비 노출은 여전하여 등급 유지."]}},{"id":4,"name":"60슬림","concept":"양면 관상 아일랜드","volume":"약 32L","substrate":"네이처팜 레드솔트 적사 (0.5cm)","filter":"모비딕 물편한 모펀지 (20하이큐브에서 이전)","light":"위크아쿠아 미니7 스팟","equipment":["자동환수시스템 (초당 1방울, 하루 ~4.3L)","API 퀵스타트 사용"],"co2":null,"hardscape":"청룡석 5~6kg 중앙 아일랜드 (순간접착 젤 접합)","fauna":[{"name":"할리퀸 라스보라","count":12,"type":"fish","note":"2026-06-08 7마리 + 06-12 5마리 입수, 준성어. 중층 군영"},{"name":"골든 볼 라미레지 롱핀","count":2,"type":"fish","note":"암수 1쌍, 2026-06-14 입수 (아내·딸 픽). 하층 주인공. 1번서 같은 모르프 성공 경험"},{"name":"블루벨벳 새우","count":12,"type":"shrimp","note":"2026-06-14 입수. 파란색 포인트(람 적안 대체)"},{"name":"제브라 다니오","count":2,"type":"fish","note":"구 4번에서 이동. 텃세 → 공존 안정화"},{"na 스 휴델로티와 미크로소리움 네로리프의 성장이 전체적인 수초 볼륨을 증가시켜 좌우 시각적 무게감이 이전보다 개선되었으나, 좌측에 집중된 모비딕 물편한 모펀지 및 기타 장비 노출로 인한 시각적 불균형은 여전히 존재합니다."},"밀도":{"grade":"A+","comment":"이전 리뷰에서 활착 초기라 볼륨이 부족하다는 지적이 있었으나, 볼비티스 휴델로티와 미크로소리움 네로리프가 매우 풍성하게 성장하여 청룡석 아일랜드의 밀도를 크게 높였습니다. 아누비아스 또한 바닥 포인트로서 효과적인 밀도를 제공하며, 전체적으로 매우 건강하고 풍성한 밀도를 보여줍니다."},"장비노출":{"grade":"C","comment":"좌측에 위치한 모비딕 물편한 모펀지가 여전히 정면에서 크게 노출되어 시선을 방해합니다. 위크아쿠아 미니7 스팟 조명의 구즈넥과 자동환수시스템 라인 또한 좌측에 집중되어 장비 노출도가 높습니다. 특히 우측에 데이터에 없는 온도계가 추가로 노출되어 양면 관상 컨셉에 있어 장비 노출은 여전히 큰 감점 요인이며, 오히려 이전보다 악화되었습니다."}},"suggestions":["모비딕 물편한 모펀지를 외부여과기 또는 히든 필터 시스템으로 교체하여 여과 장비 노출을 최소화하세요.","위크아쿠아 미니7 스팟 조명을 어항 상단에 걸치는 형태의 조명으로 교체하여 구즈넥 노출을 줄이거나, 조명 위치를 중앙으로 이동하여 시각적 균형을 맞추세요.","자동환수시스템 라인을 투명한 재질로 변경하거나, 수초 뒤편으로 최대한 숨겨 노출을 줄이세요.","우측에 노출된 온도계를 히든형 또는 디지털 인라인 온도계로 교체하여 장비 노출을 제거하세요."],"changes":["밀도 A- → A+: 볼비티스 휴델로티와 미크로소리움 네로리프의 폭발적인 성장으로 밀도가 크게 향상되었습니다.","색감 A- → A: 수초의 볼륨감 증가와 생체들의 활발한 활동으로 전체적인 색감 대비와 생동감이 더욱 선명해졌습니다.","장비노출 C+ → C: 우측에 데이터에 없는 온도계가 추가로 노출되어 장비 노출이 오히려 악화되었습니다."]},"waterParams":{"pH":"7.2~7.5 (액상시약)","KH":"약 3","GH":"약 4","note":"연수~중성·약알칼리. 청룡석 5~6kg에도 경도 낮음. 액상 GH/KH 재확인 권장"}}],"retiredTanks":[{"id":"구4","name":"20하이큐브","concept":"서브 샌드항","retiredDate":"2026-06-01","retiredReason":"새 4번(60슬림 양면 관상)으로 통합","volume":"약 8L","substrate":"샌드 (중앙 소일통)","filter":"스펀지 여과기","light":"위크아쿠아 미니7","equipment":[],"co2":null,"fauna":[{"name":"제브라 다니오","count":2,"type":"fish"},{"name":"레오파드 다니오","count":1,"type":"fish"},{"name":"야마토 새우","count":2,"type":"shrimp"},{"name":"애플 스네일","count":1,"type":"snail"}],"flora":["암브리아"],"ratings":{"여과":{"grade":"B+","comment":"스펀지 여과기는 소형 수조에 적합한 여과 방식"},"생체":{"grade":"B","comment":"제브라 2 + 레오파드 1, 다니오 전용 분리 사육으로 안정적"},"수초":{"grade":"B-","comment":"암브리아만으로 단조로운 구성, 소일통 활용 여지 있음"},"조명":{"grade":"B","comment":"미니7은 20큐브에 적합한 광량"},"수온":{"grade":"C+","comment":"히터 미설치, 여름철은 무관하나 겨울철 수온 하락 위험"},"디자인":{"grade":"C+","comment":"암브리아 단일 수초가 소일통에서 더 풍성하게 성장하여 황록색 숲 인상 강화. 다만 하드스케이프 부재와 투명 소일통 컨테이너 노출은 그대로 유지되어 구도적 한계는 document.getElementById('tabBar').addEventListener('click',function(e){
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
});

function gradeClass(g){
  if(g==='-')return'grade-na';
  if(g==='A+')return'grade-ap';if(g==='A')return'grade-a';if(g==='A-')return'grade-am';
  if(g==='B+')return'grade-bp';if(g==='B')return'grade-b';if(g==='B-')return'grade-bm';
  if(g==='C+')return'grade-cp';return'grade-c';
}
function faunaTagClass(t){
  const m={fish:{bg:'var(--blue-bg)',c:'var(--blue)',bd:'var(--blue-bd)'},
    shrimp:{bg:'var(--orange-bg)',c:'var(--orange)',bd:'var(--orange-bd)'},
    snail:{bg:'var(--purple-bg)',c:'var(--purple)',bd:'var(--purple-bd)'}};
  const s=m[t]||m.fish;return`background:${s.bg};color:${s.c};border:1px solid ${s.bd}`;
}
function countFauna(tank){
  let fish=0,shrimp=0,snail=0;
  tank.fauna.forEach(f=>{const c=typeof f.count==='number'?f.count:0;
    if(f.type==='fish')fish+=c;else if(f.type==='shrimp')shrimp+=c;else snail+=c;});
  return{fish,shrimp,snail};
}
let data=null,activeTank=null;
function drGradeBadge(g){
  if(!g||g==='-')return'g-na';
  if(g.startsWith('A'))return'g-a';if(g.startsWith('B'))return'g-b';return'g-c';
}
function renderDesign(){
  const el=document.getElementById('designCards');
  el.innerHTML=data.tanks.map((t,i)=>{
    const dr=t.designReview||{};
    const grade=dr.grade||'-';
    const summary=dr.summary||'평가 대기 중';
    const dateStr=dr.reviewDate?`리뷰 일자: ${dr.reviewDate}`:'';
    const photo=`<img class="dr-photo" src="photos/tank-${t.id}/latest.jpg" alt="${t.id}번 ${t.name} ${t.concept} 최신 사진" onerror="this.style.display='none'">`;
    let detailsHtml='';
    if(dr.details&&Object.keys(dr.details).length){
      detailsHtml=`<div class="dr-section-title">세부 평가</div><div class="dr-detail-grid">${Object.entries(dr.details).map(([k,v])=>{
        const gc=gradeClass(v.grade);
        return`<div class="dr-detail-row ${gc}"><span class="dr-detail-label">${k}</span><div class="dr-detail-bar-bg"><div class="dr-detail-bar"></div></div><span class="dr-detail-grade">${v.grade}</span><span class="dr-detail-comment">${v.comment}</span></div>`;
      }).join('')}</div>`;
    }
    let changesHtml='';
    if(dr.changes&&dr.changes.length){
      changesHtml=`<div class="dr-section-title">변경점</div><div class="dr-changes">${dr.changes.map(c=>`<div class="dr-change-item">${c}</div>`).join('')}</div>`;
    }
    let suggestHtml='';
    if(dr.suggestions&&dr.suggestions.length){
      suggestHtml=`<div class="dr-section-title">개선 제안</div><div class="dr-suggest">${dr.suggestions.map(s=>`<div class="dr-suggest-item">${s}</div>`).join('')}</div>`;
    }
    return`<div class="dr-card"><div class="dr-header" onclick="toggleDesignCard(${i})"><div class="dr-tank-num">${t.id}</div><div class="dr-title"><div class="dr-name">${t.name}</div><div class="dr-concept">${t.concept}</div></div><div class="dr-grade-badge ${drGradeBadge(grade)}">${grade}</div></div><div class="dr-body" id="drBody${i}">${photo}<div class="dr-summary">${summary}</div>${dateStr?`<div class="dr-date">${dateStr}</div>`:''}${changesHtml}${detailsHtml}${suggestHtml}</div></div>`;
  }).join('');
}
function toggleDesignCard(idx){
  const body=document.getElementById('drBody'+idx);
  body.classList.toggle('open');
}
function init(){
  data=AQUARIUM_DATA;
  renderMeta();renderSummary();renderPriorities();renderStatus();renderDesign();renderRetired();selectTank(0);
}
function renderMeta(){
  document.getElementById('hMeta').innerHTML=
    `<span class="meta-item">최종 업데이트 <strong>${data.meta.lastUpdated}</strong></span>`+
    `<span class="meta-item">수조 <strong>${data.meta.totalTanks}개</strong></span>`+
    `<span class="meta-item">수초 <strong>${cntFlora()}종</strong></span>`+
    `<span class="meta-item">생물 <strong>${cntFauna()}종</strong></span>`;
}
function cntFlora(){const s=new Set();data.tanks.forEach(t=>t.flora.forEach(f=>s.add(f)));return s.size}
function cntFauna(){const s=new Set();data.tanks.forEach(t=>t.fauna.forEach(f=>s.add(f.name)));return s.size}
function renderSummary(){
  document.getElementById('summaryRow').innerHTML=data.tanks.map((t,i)=>{
    const c=countFauna(t);let b='';
    if(c.fish)b+=`<span class="badge badge-fish">어류 ${c.fish}</span>`;
    if(c.shrimp)b+=`<span class="badge badge-shrimp">새우 ${c.shrimp}</span>`;
    if(c.snail)b+=`<span class="badge badge-snail">스네일 ${c.snail}</span>`;
    if(t.co2)b+=`<span class="badge badge-co2">CO2</span>`;
    if(t.equipment.includes('자동환수시스템'))b+=`<span class="badge badge-auto">자동환수</span>`;
    const thumb=`<div class="sum-thumb"><img src="photos/tank-${t.id}/latest.jpg" alt="${t.id}번 ${t.name} 썸네일" onerror="this.parentElement.innerHTML='<div class=\\'no-photo\\'>📷</div>'"></div>`;
    return`<div class="sum-card" onclick="selectTank(${i})"><div class="sum-card-info"><div class="num">${t.id}번 수조</div><div class="name">${t.name}</div><div class="concept">${t.concept} · ${t.volume}</div><div class="badges">${b}</div></div>${thumb}</div>`;
  }).join('');
}
function selectTank(idx){
  activeTank=idx;
  document.querySelectorAll('.sum-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  renderDetail(data.tanks[idx]);
}
function renderDetail(t){
  const p=document.getElementById('detailPanel');p.classList.add('show');
  const ratings=Object.entries(t.ratings).map(([k,v])=>{const gc=gradeClass(v.grade);
    return`<div class="rating-row ${gc}"><span class="rating-label">${k}</span><div class="rating-bar-bg"><div class="rating-bar"></div></div><span class="rating-grade">${v.grade}</span><span class="rating-comment">${v.comment}</span></div>`;}).join('');
  const fauna=t.fauna.map(f=>{const cnt=typeof f.count==='number'?` ×${f.count}`:`(${f.count})`;
    return`<span class="fauna-tag" style="${faunaTagClass(f.type)}">${f.name}${cnt}</span>`;}).join('');
  const flora=t.flora.map(f=>`<span class="flora-tag">${f}</span>`).join('');
  const recs=t.recommendations.map(r=>`<div class="rec-item">${r}</div>`).join('');
  const co2=t.co2?`<div class="spec-row"><span class="spec-label">CO2</span><span class="spec-value">${t.co2}</span></div>`:'';
  const excel=t.flourishExcel?`<div class="spec-row"><span class="spec-label">플로엑셀</span><span class="spec-value">${t.flourishExcel}</span></div>`:'';
  const eq=t.equipment.length?t.equipment.join(', '):'없음';
  p.innerHTML=`<div class="detail-header"><h2>${t.id}번 · ${t.name} <span style="font-weight:400;color:var(--text2);font-size:16px">${t.concept}</span></h2><span class="vol">${t.volume}</span></div>
    <div class="detail-body"><div class="detail-section"><h3>장비 스펙</h3><div class="spec-row"><span class="spec-label">바닥재</span><span class="spec-value">${t.substrate}</span></div><div class="spec-row"><span class="spec-label">여과</span><span class="spec-value">${t.filter}</span></div><div class="spec-row"><span class="spec-label">조명</span><span class="spec-value">${t.light}</span></div><div class="spec-row"><span class="spec-label">장비</span><span class="spec-value">${eq}</span></div>${co2}${excel}</div>
    <div class="detail-section"><h3>평가</h3><div class="rating-grid">${ratings}</div></div>
    <div class="detail-section"><h3>생물</h3><div class="fauna-list">${fauna}</div></div>
    <div class="detail-section"><h3>수초</h3><div class="flora-list">${flora}</div></div>
    <div class="detail-section full-width"><h3>개선 권고사항</h3><div class="rec-list">${recs}</div></div></div>`;
}
function renderPriorities(){
  const el=document.getElementById('priorities');const s={3:'!!!',2:'!!',1:'!'};
  el.innerHTML=`<h2>우선순위 과제</h2><div class="pri-list">${data.priorities.map(p=>`<div class="pri-item"><div class="pri-level pri-${p.level}">${s[p.level]}</div><div class="pri-content"><div class="pri-target">${p.target}</div><div class="pri-detail">${p.detail}</div></div></div>`).join('')}</div>`;
}
function renderStatus(){
  document.getElementById('statusCards').innerHTML=data.tanks.map(t=>{
    const fa=t.fauna.map(f=>{const cls=f.type==='fish'?'fish-tag':f.type==='shrimp'?'shrimp-tag':'snail-tag';
      const cnt=typeof f.count==='number'?` ×${f.count}`:` (${f.count})`;return`<span class="${cls}">${f.name}${cnt}</span>`;}).join('');
    const fl=t.flora.map(f=>`<span class="plant-tag">${f}</span>`).join('');
    const co2=t.co2?`<div class="st-cell"><div class="st-cell-label">CO2</div><div class="st-cell-value"><strong>${t.co2}</strong></div></div>`:'';
    const excel2=t.flourishExcel?`<div class="st-cell"><div class="st-cell-label">플로엑셀</div><div class="st-cell-value"><strong>${t.flourishExcel}</strong></div></div>`:'';
    const eq=t.equipment.length?t.equipment.join('<br>'):'—';
    return`<div class="st-card"><div class="st-card-header"><div class="st-tank-num">${t.id}</div><div class="st-card-title"><span class="st-name">${t.name}</span><span class="st-tag">${t.concept} · ${t.volume}</span></div></div>
      <div class="st-card-body"><div class="st-cell"><div class="st-cell-label">바닥재</div><div class="st-cell-value"><strong>${t.substrate}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">여과 시스템</div><div class="st-cell-value"><strong>${t.filter}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">조명</div><div class="st-cell-value"><strong>${t.light}</strong></div></div>
      <div class="st-cell"><div class="st-cell-label">장비</div><div class="st-cell-value">${eq}</div></div>${co2}${excel2}
      <div class="st-bio"><div class="st-cell"><div class="st-cell-label">생물 라인업</div><div class="tag-list">${fa}</div></div>
      <div class="st-cell"><div class="st-cell-label">수초</div><div class="tag-list">${fl}</div></div></div></div></div>`;
  }).join('');
}
const GITHUB_API='https://api.github.com/repos/Catomo88/Aquarium/contents/photos';
let historyCache={};
let activeHistoryFilter='all';

function renderHistoryFilter(){
  const el=document.getElementById('historyFilter');
  const icons=['🐠','🏔️','🌿','🐟','🦐','📸'];
  const btns=[{id:'all',icon:'📋',label:'전체'}];
  data.tanks.forEach((t,i)=>btns.push({id:'tank-'+t.id,icon:icons[i]||'🐠',label:t.id+'번'}));
  btns.push({id:'panorama',icon:'🌊',label:'파노라마'});
  if(data.retiredTanks&&data.retiredTanks.length)btns.push({id:'retired',icon:'📦',label:'추억'});
  el.innerHTML=btns.map(b=>`<div class="hf-btn${b.id===activeHistoryFilter?' active':''}" onclick="filterHistory('${b.id}')"><span class="hf-icon">${b.icon}</span>${b.label}</div>`).join('');
}

function filterHistory(id){
  activeHistoryFilter=id;
  renderHistoryFilter();
  renderHistoryContent();
}

async function loadHistory(){
  renderHistoryFilter();
  const folders=['tank-1','tank-2','tank-3','tank-4','panorama','retired-4','retired-5'];
  for(const folder of folders){
    if(historyCache[folder])continue;
    try{
      const res=await fetch(`${GITHUB_API}/${folder}`,{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!res.ok){historyCache[folder]=[];continue;}
      const files=await res.json();
      historyCache[folder]=files.filter(f=>f.name!=='latest.jpg'&&f.name.endsWith('.jpg')).map(f=>({
        name:f.name,
        url:f.download_url,
        date:f.name.replace('.jpg','').replace('_',' ').replace(/(\d{4})-(\d{2})-(\d{2}) (\d{2})(\d{2})/,'$1.$2.$3 $4:$5')
      })).sort((a,b)=>b.name.localeCompare(a.name));
    }catch(e){historyCache[folder]=[];}
  }
  renderHistoryContent();
}

function renderHistoryContent(){
  const el=document.getElementById('historyContent');
  var allFolders=['tank-1','tank-2','tank-3','tank-4','panorama','retired-4','retired-5'];
  const folders=activeHistoryFilter==='all'?allFolders:activeHistoryFilter==='retired'?['retired-4','retired-5']:[activeHistoryFilter];
  const tankNames={'tank-1':'1번 2자 슬림','tank-2':'2번 30하이큐브 샌드항','tank-3':'3번 30하이큐브 수초항','tank-4':'4번 60슬림 양면관상','panorama':'★ 파노라마','retired-4':'[추억] 구4번 20하이큐브 샌드항','retired-5':'[추억] 구5번 20하이큐브 수초항'};
  let html='';
  let hasPhotos=false;
  for(const folder of folders){
    const photos=historyCache[folder]||[];
    if(photos.length===0)continue;
    hasPhotos=true;
    html+=`<div class="history-tank"><div class="history-tank-header"><h3>${tankNames[folder]||folder}</h3><span class="photo-count">${photos.length}장</span></div><div class="history-strip">`;
    photos.forEach((p,i)=>{
      const isLatest=i===0;
      html+=`<div class="history-item${isLatest?' latest':''}" onclick="openLightbox('${p.url}','${tankNames[folder]} — ${p.date}')"><img src="${p.url}" loading="lazy"><div class="hi-meta">${isLatest?'<div class="hi-tag">최신</div>':''}<div class="hi-date">${p.date}</div></div></div>`;
    });
    html+=`</div></div>`;
  }
  if(!hasPhotos)html=`<div class="history-empty">📷 아직 업로드된 사진이 없습니다.<br>카메라 버튼으로 첫 사진을 찍어보세요!</div>`;
  el.innerHTML=html;
}

function openLightbox(url,info){
  document.getElementById('lbImg').src=url;
  document.getElementById('lbInfo').textContent=info;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}

function renderRetired(){
  var el=document.getElementById('retiredCards');
  var retired=data.retiredTanks||[];
  if(!retired.length){el.innerHTML='<div class="history-empty">추억의 어항이 없습니다.</div>';return;}
  var h='<div class="retired-header-wrap"><h2>추억의 어항</h2><p>더 나은 환경을 위해 통합되거나 해체된 어항들의 기록</p></div>';
  h+=retired.map(function(t){
    var fa=t.fauna.map(function(f){var cls=f.type==='fish'?'fish-tag':f.type==='shrimp'?'shrimp-tag':'snail-tag';
      var cnt=typeof f.count==='number'?' ×'+f.count:' ('+f.count+')';return '<span class="'+cls+'">'+f.name+cnt+'</span>';}).join('');
    var fl=t.flora.map(function(f){return '<span class="plant-tag">'+f+'</span>';}).join('');
    var co2=t.co2?'<div class="st-cell"><div class="st-cell-label">CO2</div><div class="st-cell-value"><strong>'+t.co2+'</strong></div></div>':'';
    var eq=t.equipment&&t.equipment.length?t.equipment.join('<br>'):'—';
    var reason=t.retiredReason?'<div class="retired-reason">📦 '+t.retiredReason+' ('+t.retiredDate+')</div>':'';
    var photoFolder=t.id==='구4'?'retired-4':'retired-5';
    var photo='<div class="st-cell" style="grid-column:1/-1;padding:0"><img src="photos/'+photoFolder+'/latest.jpg" style="width:100%;max-height:200px;object-fit:cover;display:block" onerror="this.style.display=\'none\'"></div>';
    return '<div class="st-card retired-card"><div class="st-card-header"><div class="st-tank-num" style="background:linear-gradient(135deg,#4a5568,#718096)">'+t.id+'</div><div class="st-card-title"><span class="st-name">'+t.name+'<span class="retired-badge">해체됨</span></span><span class="st-tag">'+t.concept+' \xb7 '+t.volume+'</span></div></div>'+photo+'<div class="st-card-body"><div class="st-cell"><div class="st-cell-label">바닥재</div><div class="st-cell-value"><strong>'+t.substrate+'</strong></div></div><div class="st-cell"><div class="st-cell-label">여과 시스템</div><div class="st-cell-value"><strong>'+t.filter+'</strong></div></div><div class="st-cell"><div class="st-cell-label">조명</div><div class="st-cell-value"><strong>'+t.light+'</strong></div></div><div class="st-cell"><div class="st-cell-label">장비</div><div class="st-cell-value">'+eq+'</div></div>'+co2+'<div class="st-bio"><div class="st-cell"><div class="st-cell-label">생물 라인업 (해체 당시)</div><div class="tag-list">'+fa+'</div></div><div class="st-cell"><div class="st-cell-label">수초</div><div class="tag-list">'+fl+'</div></div></div></div>'+reason+'</div>';
  }).join('');
  el.innerHTML=h;
}

// Load history when tab is clicked
document.getElementById('tabBar').addEventListener('click',function(e){
  const t=e.target.closest('.tab');
  if(t&&t.dataset.tab==='history')loadHistory();
});

init();
</script>
