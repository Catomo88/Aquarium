name: 어항 디자인 리뷰 (Gemini)

# 사진이 photos/ 에 푸시될 때마다 실행 (camera.html 업로드 = 커밋이므로 자동 트리거)
on:
  push:
    paths:
      - "photos/**"
  workflow_dispatch: {}   # 수동 실행도 허용

# 같은 브랜치의 이전 실행이 진행 중이면 취소 (사진 2장 연속 업로드 시 중복 방지)
concurrency:
  group: design-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    # 봇이 만든 리뷰 커밋([skip ci])으로는 재실행 방지 (이중 안전장치)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 디자인 리뷰 실행
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/review.py

      - name: 변경 사항 커밋 & 푸시
        if: ${{ steps.review.outputs.changed == 'true' }}
        run: |
          git config user.name "Catomo88"
          git config user.email "ctm1544@gmail.com"
          git add aquarium-data.json index.html
          git commit -m "${{ steps.review.outputs.commit_msg }} [skip ci]"
          git push
